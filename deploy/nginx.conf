server {
    listen 80;
    server_name _;

    access_log /var/log/nginx/mywebapp.access.log;
    error_log /var/log/nginx/mywebapp.error.log;

    location = / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /tasks {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        deny all;
        return 404;
    }
}